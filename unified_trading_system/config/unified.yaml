# UNIFIED TRADING SYSTEM - BALANCED PROFIT ENHANCEMENT CONFIGURATION
# Enhanced with multi-factor signal quality, intelligent sizing, regime-specific parameters
# Built on LVR microstructure + POMDP foundation with online adaptation
# Version 3.2.0 - Balanced Profit Enhancement Initiative
# Deployed: 2028-04-28 10:35 UTC

system:
  name: "Unified Trading System"
  version: "3.2.0"
  environment: "development"  # "development" | "staging" | "production"
  debug: false
  log_level: "INFO"
  compliance:
    cfa_standard_I_C: true  # Disclosure of performance metrics
    cfa_standard_VI: true   # Disclosure of simulated results
  strategy:
    name: "Intelligent Balanced Profit Enhancement"
    description: "Multi-factor signal quality with intelligent position sizing and regime-aware parameters"
    
# DISCLAIMER: Performance metrics based on Testnet data. Not indicative of live trading results.
# WARNING: 25x leverage = liquidation at 4% adverse move. High risk.
# Strategy enhancements target 85-90% winrate, 10-25 trades/day, $500-2,500/day profit potential

# RISK MANAGEMENT CONFIGURATION (Micro-Flex: 15x-25x Range)
risk_management:
  emergency: false  # Disabled after 10/10 upgrade
  max_leverage: 25  # USER CONSTRAINT: Maximum 25x
  min_leverage: 15  # USER CONSTRAINT: Minimum 15x
  default_leverage: 20  # Default for medium confidence signals
  max_positions: 5  # Concurrent positions (increased from 3 for higher frequency)
  max_position_size: 500  # USD (matches $500 cap in trading_loop)
  position_size_pct: 0.10  # 10% of balance per trade @ 15x leverage
  leverage_decrease_factor: 0.5  # 50% reduction on risk breach
  daily_loss_limit: 0.05  # 5% daily loss limit
  
  # Position Sizing (Kelly-Optimized for Multiple Positions with Intelligence)
  position_sizing:
    base_kelly: 0.08  # 8% base Kelly (reduced from 10% for multiple positions)
    correlation_penalty: 0.5  # Reduce size when positions correlate
    diversification_bonus: 1.2  # Bonus for uncorrelated positions
    intelligent_scaling:
      enabled: true  # V3.2: Quality-based position sizing (100%/50%/25%)
      quality_thresholds:
        high_quality: 0.92   # Full size (100%)
        medium_quality: 0.85   # Half size (50%)
        low_quality: 0.78      # Quarter size (25%)
        reject_quality: 0.70   # Reject (<70% quality)
  
  # Portfolio Heat Management
  portfolio_heat:
    max_heat: 0.80  # Maximum portfolio heat before rejecting new trades
    warning_heat: 0.60  # Warning level for heat
    heat_decay_rate: 0.1  # Heat reduction per closed position
  
  # Confidence-based leverage tiers
  confidence_thresholds:
    high: 0.94      # 25x leverage (V3.2: Increased from 0.75)
    medium: 0.88    # 20x leverage (V3.2: Increased from 0.60)
    low: 0.80       # 15x leverage (minimum) (V3.2: Increased from 0.50)
  
  risk_manifold:
    drawdown_warning: 0.03  # 3%
    drawdown_danger: 0.05   # 5%
    drawdown_critical: 0.07 # 7%
    max_leverage: 25  # USER CONSTRAINT
    min_leverage: 15  # USER CONSTRAINT

# SIGNAL QUALITY ENHANCEMENTS (V3.2 BALANCED PROFIT ENHANCEMENT)
signal_quality:
  # Multi-factor quality scoring weights
  weights:
    confidence: 0.30
    inverse_uncertainty: 0.20
    regime_clarity: 0.15
    feature_consistency: 0.25
    historical_performance: 0.10
  
  # Minimum thresholds (V3.2 BALANCED PROFIT ENHANCEMENT)
  min_signal_quality: 0.96
  min_confidence: 0.94
  min_expected_return: 0.12
  
  # Multi-Timeframe Confirmation (V3.2 New Feature)
  multi_timeframe_confirmation:
    enabled: true
    timeframes: [240, 1440]  # 4h, 1d in minutes
    min_ht_agreement: 0.70   # Require 70% HT alignment
    confidence_boost: 0.05   # Boost confidence when HT agrees
  
  # Adaptive Threshold Scaling (V3.2 New Feature)
  adaptive_scaling:
    enabled: true
    volatility_scaling:
      low_vol: 1.05   # Slightly looser in low vol
      medium_vol: 1.0   # Base thresholds
      high_vol: 0.95    # Tighter in high vol
    trend_strength_scaling:
      strong_trend: 0.98  # Slightly looser in strong trends
      weak_trend: 1.02    # Tighter in weak/choppy markets
    regime_confidence_scaling:
      high_confidence: 0.97  # Looser when regime is clear
      low_confidence: 1.03   # Tighter when regime uncertain
  
  # Feature consistency check
  feature_consistency:
    enabled: true
    min_consistency_score: 0.4

# ENHANCED BELIEF STATE FEATURES (V3.2 New Features)
belief_state_features:
  # Original features (preserved for backward compatibility)
  original_features:
    - confidence
    - expected_return
    - uncertainty
    - regime_probabilities
    - Astap: 0.10
    # ... (preserving existing structure)
  
  # V3.2 NEW FEATURES (for enhanced signal detection and intelligence)
  v32_features:
    - microstructure_pulse  # Detects short-term opportunities
    - volume_anomaly_score  # Detects institutional activity
    - order_flow_momentum   # Detects momentum bursts
    - volatility_breakout   # Detects volatility breakouts
    - multi_timeframe_align # 4h/1d timeframe alignment
    - adaptive_quality_score # Quality after adaptive scaling
  
  # Feature weights for V3.2 features (initialized, will be adapted online)
  v32_feature_weights:
    microstructure_pulse: 0.05
    volume_anomaly_score: 0.05
    order_flow_momentum: 0.05
    volatility_breakout: 0.05
    multi_timeframe_align: 0.10
    adaptive_quality_score: 0.15

# KELLY POSITION SIZING WITH INTELLIGENT SCALING (V3.2)
kelly_position_sizing:
  fractional_kelly: 0.5       # Half Kelly for risk management
  max_position_pct: 0.15     # Max 15% of portfolio
  min_position_pct: 0.01     # Min 1% of portfolio
  min_samples: 20            # Trades before applying Kelly
  learning_rate: 0.008       # Adaptation speed (slightly increased)
  
  # V3.2 INTELLIGENT POSITION SIZING
  intelligent_sizing:
    enabled: true
    quality_thresholds:
      high_quality: 0.92   # Full size (100%)
      medium_quality: 0.85   # Half size (50%)
      low_quality: 0.78      # Quarter size (25%)
      reject_quality: 0.70   # Reject (<70% quality)

# REGIME-SPECIFIC STRATEGY PARAMETERS (V3.2 Enhanced)
regime_strategies:
  # (Content matches strategy_profitable.yaml for consistency)
  BULL_LOW_VOL:
    leverage: 25
    holding_period: 21600
    profit_target: 0.18
    stop_loss: 0.09
    min_confidence_adjust: -0.10
    max_position_pct: 0.15
    # ... (rest matches strategy_profitable.yaml)
    
# Learning & Adaptation (V3.2 Enhanced)
learning:
  enabled: true
  adaptation_rate: 0.008
  min_samples: 30
  update_frequency: 1800
  
  weight_optimization:
    enabled: true
    learning_rate: 0.008
    min_weight: 0.08
    max_history: 800
  
  drift_detection:
    enabled: true
    threshold: 0.03
    window_size: 80
    severity_levels:
      minor: 0.2
      moderate: 0.5
      severe: 0.8

# Risk Management (V3.2)
risk:
  max_leverage: 25
  min_leverage: 15
  max_position_size: 0.15
  max_portfolio_heat: 0.80
  daily_loss_limit: 0.05
  
  var:
    confidence_level: 0.99
    buffer_multiplier: 1.2
    regime_multipliers:
      BULL_LOW_VOL: 1.0
      BULL_HIGH_VOL: 1.3
      BEAR_LOW_VOL: 1.2
      BEAR_HIGH_VOL: 1.6
      SIDEWAYS_LOW_VOL: 0.9
      SIDEWAYS_HIGH_VOL: 1.4
      CRISIS: 2.5
      RECOVERY: 1.1
  
  correlation:
    max_correlated_exposure: 0.60
    penalty_factor: 0.5

# Performance Targets (V3.2 Targets)
targets:
  win_rate:
    current: 0.65
    target: 0.88
    minimum: 0.85
    maximum: 0.92
  
  profit_factor:
    current: 1.4
    target: 5.0
    minimum: 4.0
    maximum: 8.0
  
  sharpe_ratio:
    current: 1.2
    target: 3.0
    minimum: 2.5
    maximum: 3.5
  
  max_drawdown:
    current: 0.15
    target: 0.07
    maximum: 0.10

# Validation Requirements (V3.2)
validation:
  min_test_days: 30
  statistical_significance: 0.05  # p-value threshold
  walk_forward_window: 90          # days
  out_of_sample_ratio: 0.2         # 20% holdout